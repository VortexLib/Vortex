<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="vortexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e050;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009933;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1a1a2e" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#vortexGrad)" stroke-width="4" opacity="0.3"/>
  <!-- Vortex spiral -->
  <g transform="translate(256,256)">
    <!-- Outer spiral arm 1 -->
    <path d="M 0,-160 A 160,160 0 0,1 138.6,80 A 100,100 0 0,0 0,-100"
          fill="none" stroke="url(#vortexGrad)" stroke-width="28" stroke-linecap="round" opacity="0.9"/>
    <!-- Outer spiral arm 2 -->
    <path d="M 0,160 A 160,160 0 0,1 -138.6,-80 A 100,100 0 0,0 0,100"
          fill="none" stroke="url(#vortexGrad)" stroke-width="28" stroke-linecap="round" opacity="0.9"/>
    <!-- Inner spiral arm 1 -->
    <path d="M 0,-70 A 70,70 0 0,1 60.6,35 A 35,35 0 0,0 0,-35"
          fill="none" stroke="url(#vortexGrad)" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
    <!-- Inner spiral arm 2 -->
    <path d="M 0,70 A 70,70 0 0,1 -60.6,-35 A 35,35 0 0,0 0,35"
          fill="none" stroke="url(#vortexGrad)" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="12" fill="url(#vortexGrad)"/>
  </g>
</svg>
