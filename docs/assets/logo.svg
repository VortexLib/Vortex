<svg width="100%" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="vg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#00E050"/>
<stop offset="100%" stop-color="#007733"/>
</linearGradient>
</defs>

<!-- Background circle -->
<circle cx="256" cy="256" r="250" fill="#13132b"/>
<circle cx="256" cy="256" r="248" fill="none" stroke="#00cc44" stroke-width="0.75" opacity="0.12"/>

<!-- Vortex spiral mark -->
<g transform="translate(256, 256)">
<!-- Outer ring: r=140 -->
<path d="M0,-140 A140,140 0 0,1 121.2,70" fill="none" stroke="#00E050" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
<path d="M121.2,70 A140,140 0 0,1 -121.2,70" fill="none" stroke="#00BB66" stroke-width="14" stroke-linecap="round" opacity="0.8"/>
<path d="M-121.2,70 A140,140 0 0,1 0,-140" fill="none" stroke="#009944" stroke-width="12" stroke-linecap="round" opacity="0.65"/>

<!-- Middle ring: r=88 -->
<path d="M0,-88 A88,88 0 0,1 76.2,44" fill="none" stroke="#00E050" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
<path d="M76.2,44 A88,88 0 0,1 -76.2,44" fill="none" stroke="#00BB66" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
<path d="M-76.2,44 A88,88 0 0,1 0,-88" fill="none" stroke="#009944" stroke-width="9" stroke-linecap="round" opacity="0.5"/>

<!-- Inner ring: r=44 -->
<path d="M0,-44 A44,44 0 0,1 38.1,22" fill="none" stroke="#00E050" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
<path d="M38.1,22 A44,44 0 0,1 -38.1,22" fill="none" stroke="#00BB66" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
<path d="M-38.1,22 A44,44 0 0,1 0,-44" fill="none" stroke="#009944" stroke-width="6" stroke-linecap="round" opacity="0.35"/>

<!-- Center dot -->
<circle cx="0" cy="0" r="9" fill="url(#vg)"/>

<!-- Satellite dots at arc endpoints -->
<circle cx="0" cy="-140" r="6" fill="#00E050" opacity="0.9"/>
<circle cx="76.2" cy="44" r="4.5" fill="#00BB66" opacity="0.7"/>
<circle cx="-38.1" cy="22" r="3" fill="#009944" opacity="0.55"/>
</g>
</svg>
