<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e050;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009933;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="300" rx="16" fill="url(#bgGrad)"/>
  <rect x="2" y="2" width="1196" height="296" rx="14" fill="none" stroke="url(#bannerGrad)" stroke-width="2" opacity="0.2"/>
  <!-- Mini vortex icon -->
  <g transform="translate(150,150) scale(0.45)">
    <path d="M 0,-160 A 160,160 0 0,1 138.6,80 A 100,100 0 0,0 0,-100"
          fill="none" stroke="url(#bannerGrad)" stroke-width="28" stroke-linecap="round" opacity="0.9"/>
    <path d="M 0,160 A 160,160 0 0,1 -138.6,-80 A 100,100 0 0,0 0,100"
          fill="none" stroke="url(#bannerGrad)" stroke-width="28" stroke-linecap="round" opacity="0.9"/>
    <path d="M 0,-70 A 70,70 0 0,1 60.6,35 A 35,35 0 0,0 0,-35"
          fill="none" stroke="url(#bannerGrad)" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
    <path d="M 0,70 A 70,70 0 0,1 -60.6,-35 A 35,35 0 0,0 0,35"
          fill="none" stroke="url(#bannerGrad)" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
    <circle cx="0" cy="0" r="12" fill="url(#bannerGrad)"/>
  </g>
  <!-- Text -->
  <text x="320" y="170" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="700" fill="#ffffff" letter-spacing="6">VORTEX</text>
  <text x="325" y="220" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#8a8aa0" letter-spacing="8">VEX V5 ODOMETRY TEMPLATE</text>
  <!-- Decorative line -->
  <line x1="320" y1="240" x2="780" y2="240" stroke="url(#bannerGrad)" stroke-width="2" opacity="0.3"/>
</svg>
