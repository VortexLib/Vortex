<svg width="100%" viewBox="0 0 680 210" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#16163a"/>
<stop offset="50%" stop-color="#132230"/>
<stop offset="100%" stop-color="#0d2018"/>
</linearGradient>
<linearGradient id="vg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#00E050"/>
<stop offset="100%" stop-color="#007733"/>
</linearGradient>
<mask id="text-gaps" maskUnits="userSpaceOnUse">
<rect x="0" y="0" width="680" height="210" fill="white"/>
<rect x="245" y="43" width="230" height="60" fill="black" rx="2"/>
<rect x="155" y="103" width="410" height="22" fill="black" rx="2"/>
</mask>
</defs>

<!-- Background -->
<rect x="0" y="0" width="680" height="200" rx="12" fill="url(#bg)"/>

<!-- Subtle grid -->
<g opacity="0.05" stroke="#fff" stroke-width="0.5">
<line x1="0" y1="40" x2="680" y2="40"/>
<line x1="0" y1="80" x2="680" y2="80" mask="url(#text-gaps)"/>
<line x1="0" y1="120" x2="680" y2="120" mask="url(#text-gaps)"/>
<line x1="0" y1="160" x2="680" y2="160"/>
<line x1="136" y1="0" x2="136" y2="200" mask="url(#text-gaps)"/>
<line x1="272" y1="0" x2="272" y2="200" mask="url(#text-gaps)"/>
<line x1="408" y1="0" x2="408" y2="200" mask="url(#text-gaps)"/>
<line x1="544" y1="0" x2="544" y2="200" mask="url(#text-gaps)"/>
</g>

<!-- Vortex mark (left side) -->
<g transform="translate(120, 100)">
<!-- Outer arcs: r=58 -->
<path d="M0,-58 A58,58 0 0,1 50,29" fill="none" stroke="#00E050" stroke-width="6" stroke-linecap="round" opacity="0.8" mask="url(#text-gaps)"/>
<path d="M50,29 A58,58 0 0,1 -50,29" fill="none" stroke="#00BB66" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
<path d="M-50,29 A58,58 0 0,1 0,-58" fill="none" stroke="#009944" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
<!-- Inner arcs: r=30 -->
<path d="M0,-30 A30,30 0 0,1 26,15" fill="none" stroke="#00E050" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
<path d="M26,15 A30,30 0 0,1 -26,15" fill="none" stroke="#00BB66" stroke-width="3" stroke-linecap="round" opacity="0.4" mask="url(#text-gaps)"/>
<path d="M-26,15 A30,30 0 0,1 0,-30" fill="none" stroke="#009944" stroke-width="3" stroke-linecap="round" opacity="0.35" mask="url(#text-gaps)"/>
<!-- Dots -->
<circle cx="0" cy="0" r="4" fill="url(#vg)"/>
<circle cx="0" cy="-58" r="3" fill="#00E050" opacity="0.8"/>
<circle cx="26" cy="15" r="2.5" fill="#00BB66" opacity="0.6"/>
</g>

<!-- Wordmark -->
<text x="360" y="88" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="44" font-weight="500" letter-spacing="7" fill="#ffffff">VORTEX</text>

<!-- Tagline -->
<text x="360" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="3" fill="#8a8a92">ODOMETRY &amp; MOTION CONTROL FOR VEX V5</text>

<!-- Tech badges -->
<g transform="translate(360, 148)">
<rect x="-155" y="0" width="72" height="22" rx="11" fill="none" stroke="#00E050" stroke-width="0.8" opacity="0.6"/>
<text x="-119" y="15" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#66EEAA">PROS</text>

<rect x="-65" y="0" width="72" height="22" rx="11" fill="none" stroke="#00BB66" stroke-width="0.8" opacity="0.6"/>
<text x="-29" y="15" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#88DDAA">C++</text>

<rect x="25" y="0" width="72" height="22" rx="11" fill="none" stroke="#009944" stroke-width="0.8" opacity="0.6"/>
<text x="61" y="15" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#77CC99">Modular</text>

<rect x="115" y="0" width="72" height="22" rx="11" fill="none" stroke="#8a8a92" stroke-width="0.8" opacity="0.4"/>
<text x="151" y="15" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#aaaaaa">v0.0.1</text>
</g>

<!-- Motion trail dots (right side) -->
<circle cx="570" cy="60" r="2" fill="#00E050" opacity="0.4"/>
<circle cx="585" cy="75" r="2.5" fill="#00BB66" opacity="0.35"/>
<circle cx="595" cy="95" r="3" fill="#00E050" opacity="0.3"/>
<circle cx="600" cy="118" r="2" fill="#009944" opacity="0.25"/>
<circle cx="598" cy="140" r="1.5" fill="#00BB66" opacity="0.2"/>
</svg>
