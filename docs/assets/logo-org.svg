<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="orgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e050;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009933;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="#1a1a2e"/>
  <!-- Vortex spiral -->
  <g transform="translate(200,185) scale(0.55)">
    <path d="M 0,-160 A 160,160 0 0,1 138.6,80 A 100,100 0 0,0 0,-100"
          fill="none" stroke="url(#orgGrad)" stroke-width="30" stroke-linecap="round" opacity="0.95"/>
    <path d="M 0,160 A 160,160 0 0,1 -138.6,-80 A 100,100 0 0,0 0,100"
          fill="none" stroke="url(#orgGrad)" stroke-width="30" stroke-linecap="round" opacity="0.95"/>
    <path d="M 0,-70 A 70,70 0 0,1 60.6,35 A 35,35 0 0,0 0,-35"
          fill="none" stroke="url(#orgGrad)" stroke-width="22" stroke-linecap="round" opacity="0.75"/>
    <path d="M 0,70 A 70,70 0 0,1 -60.6,-35 A 35,35 0 0,0 0,35"
          fill="none" stroke="url(#orgGrad)" stroke-width="22" stroke-linecap="round" opacity="0.75"/>
    <circle cx="0" cy="0" r="14" fill="url(#orgGrad)"/>
  </g>
  <!-- Text -->
  <text x="200" y="350" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="6">VORTEX</text>
</svg>
